server:
  port: 8080

spring:
  application:
    name: iam-service

  config:
    import:
      - optional:file:.env.properties
      - optional:classpath:application-oauth.yml

  datasource:
    url: jdbc:mysql://${APP_DB_HOST:localhost}:${APP_DB_PORT:3307}/${APP_DB_NAME:demo}?useUnicode=true&characterEncoding=utf8&serverTimezone=${APP_DB_TIMEZONE:Asia/Seoul}
    username: ${APP_DB_USERNAME:demo}
    password: ${APP_DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 3s

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  mail:
    host: ${APP_MAIL_HOST:smtp.gmail.com}
    port: ${APP_MAIL_PORT:587}
    username: ${APP_MAIL_USERNAME:}
    password: ${APP_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${APP_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${APP_MAIL_SMTP_STARTTLS_ENABLE:true}
          ssl:
            trust: smtp.gmail.com

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost}

  jwt:
    secret: ${APP_JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_CHANGE_ME_123456}
    access-minutes: ${APP_JWT_ACCESS_MINUTES:10}
    refresh-days: ${APP_JWT_REFRESH_DAYS:30}

  cookie:
    secure: ${APP_COOKIE_SECURE:false}
    same-site: ${APP_COOKIE_SAMESITE:Lax}

  mail:
    from: ${APP_MAIL_FROM:no-reply@example.com}
    auth-code-expire-minutes: ${APP_MAIL_AUTH_CODE_EXPIRE_MINUTES:5}

  upload-root: ${APP_UPLOAD_ROOT:./uploads}

portone:
  api-secret: ${PORTONE_API_SECRET:your-portone-v2-api-secret}
  store-id: ${PORTONE_STORE_ID:your-store-id}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: debug

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    doc-expansion: none

crawler:
  python-command: ${APP_CRAWLER_PYTHON_COMMAND:python}
  script-path: ${APP_CRAWLER_SCRIPT_PATH:src/main/java/com/example/demo/crawler/musinsa_catalog_crawler.py}

