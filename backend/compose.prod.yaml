services:
  redis:
    image: redis:7-alpine
    container_name: demo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: demo-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.properties
    depends_on:
      - redis
    volumes:
      - ./uploads:/app/uploads

volumes:
  redis_data:
